<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4b5563"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">EKS + CI/CD + Monitoring Demo</text>

  <!-- Developer -->
  <rect x="20" y="90" width="150" height="60" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="95" y="115" text-anchor="middle" font-size="13" font-weight="600" fill="#3730a3">Developer</text>
  <text x="95" y="133" text-anchor="middle" font-size="11" fill="#4338ca">git push / PR</text>

  <!-- GitHub -->
  <rect x="20" y="200" width="150" height="90" rx="8" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
  <text x="95" y="225" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">GitHub</text>
  <text x="95" y="243" text-anchor="middle" font-size="11" fill="#374151">Actions workflows</text>
  <text x="95" y="258" text-anchor="middle" font-size="10" fill="#6b7280">terraform.yml</text>
  <text x="95" y="272" text-anchor="middle" font-size="10" fill="#6b7280">app-ci-cd.yml</text>

  <text x="95" y="185" text-anchor="middle" font-size="10" fill="#9ca3af">(or Jenkins — Jenkinsfile)</text>

  <line x1="95" y1="150" x2="95" y2="198" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- OIDC arrow to AWS box -->
  <line x1="170" y1="245" x2="245" y2="245" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="207" y="235" text-anchor="middle" font-size="10" fill="#6b7280">assume role</text>
  <text x="207" y="260" text-anchor="middle" font-size="9" fill="#9ca3af">(GitHub OIDC,</text>
  <text x="207" y="271" text-anchor="middle" font-size="9" fill="#9ca3af">no static keys)</text>

  <!-- AWS boundary -->
  <rect x="250" y="70" width="690" height="520" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="270" y="95" font-size="13" font-weight="700" fill="#92400e">AWS</text>

  <!-- VPC boundary -->
  <rect x="280" y="115" width="640" height="455" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="300" y="138" font-size="12" font-weight="700" fill="#166534">VPC (public + private subnets, 1 NAT GW)</text>

  <!-- ECR -->
  <rect x="310" y="160" width="150" height="70" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="385" y="188" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">ECR</text>
  <text x="385" y="205" text-anchor="middle" font-size="10" fill="#1e40af">immutable, sha-tagged</text>
  <text x="385" y="218" text-anchor="middle" font-size="10" fill="#1e40af">images</text>

  <line x1="250" y1="230" x2="308" y2="195" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="290" y="215" text-anchor="middle" font-size="10" fill="#6b7280">push</text>

  <!-- EKS cluster boundary -->
  <rect x="490" y="150" width="410" height="400" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="510" y="173" font-size="12" font-weight="700" fill="#3730a3">EKS Cluster</text>

  <line x1="250" y1="245" x2="488" y2="245" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="370" y="238" text-anchor="middle" font-size="10" fill="#6b7280">kubectl apply / rollout</text>

  <!-- sample-app namespace -->
  <rect x="515" y="195" width="360" height="150" rx="8" fill="#ffffff" stroke="#818cf8" stroke-width="1.5"/>
  <text x="530" y="216" font-size="12" font-weight="700" fill="#3730a3">ns: sample-app</text>

  <rect x="535" y="230" width="140" height="60" rx="6" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="605" y="252" text-anchor="middle" font-size="11" font-weight="600" fill="#3730a3">Deployment</text>
  <text x="605" y="267" text-anchor="middle" font-size="9" fill="#4338ca">Flask app + HPA</text>
  <text x="605" y="280" text-anchor="middle" font-size="9" fill="#4338ca">/health /metrics</text>

  <rect x="700" y="230" width="150" height="60" rx="6" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="775" y="255" text-anchor="middle" font-size="11" font-weight="600" fill="#3730a3">Service</text>
  <text x="775" y="270" text-anchor="middle" font-size="9" fill="#4338ca">ClusterIP :80</text>

  <line x1="675" y1="260" x2="698" y2="260" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="605" y="320" text-anchor="middle" font-size="9" fill="#6366f1">ServiceMonitor scraped by ↓</text>

  <!-- monitoring namespace -->
  <rect x="515" y="365" width="360" height="165" rx="8" fill="#ffffff" stroke="#f472b6" stroke-width="1.5"/>
  <text x="530" y="386" font-size="12" font-weight="700" fill="#9d174d">ns: monitoring (kube-prometheus-stack)</text>

  <rect x="535" y="400" width="150" height="65" rx="6" fill="#fce7f3" stroke="#ec4899"/>
  <text x="610" y="425" text-anchor="middle" font-size="11" font-weight="600" fill="#9d174d">Prometheus</text>
  <text x="610" y="440" text-anchor="middle" font-size="9" fill="#be185d">scrapes /metrics</text>
  <text x="610" y="453" text-anchor="middle" font-size="9" fill="#be185d">every 15s</text>

  <rect x="705" y="400" width="145" height="65" rx="6" fill="#fce7f3" stroke="#ec4899"/>
  <text x="777" y="425" text-anchor="middle" font-size="11" font-weight="600" fill="#9d174d">Grafana</text>
  <text x="777" y="440" text-anchor="middle" font-size="9" fill="#be185d">LoadBalancer svc</text>
  <text x="777" y="453" text-anchor="middle" font-size="9" fill="#be185d">dashboards</text>

  <line x1="685" y1="432" x2="703" y2="432" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="694" y="422" text-anchor="middle" font-size="8" fill="#6b7280">query</text>

  <!-- vertical connector: sample-app -> prometheus -->
  <line x1="605" y1="290" x2="610" y2="398" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- terraform note -->
  <rect x="310" y="500" width="150" height="60" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="385" y="525" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">Terraform</text>
  <text x="385" y="542" text-anchor="middle" font-size="9" fill="#6d28d9">provisions everything</text>
  <text x="385" y="554" text-anchor="middle" font-size="9" fill="#6d28d9">in this dashed box</text>

  <line x1="385" y1="500" x2="385" y2="235" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,3"/>
</svg>
