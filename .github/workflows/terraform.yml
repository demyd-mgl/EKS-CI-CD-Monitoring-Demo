name: Terraform (infra)

# Cost-safety default: `plan` runs automatically (read-only, free) on PRs and
# pushes to main so you always see what would change. `apply` NEVER runs
# automatically -- it only runs when someone manually triggers this workflow
# from the Actions tab ("Run workflow") and types the exact confirmation
# phrase below. That's deliberate: this repo provisions real, billed AWS
# resources (EKS, NAT gateway, etc.), and a stray commit should never be able
# to trigger a bill.

on:
  pull_request:
    paths:
      - "terraform/**"
  push:
    branches: [main]
    paths:
      - "terraform/**"
  workflow_dispatch:
    inputs:
      confirm_apply:
        description: 'Type exactly "apply" to actually create/modify real AWS resources. Anything else runs a plan only.'
        required: true
        default: ""

permissions:
  id-token: write   # needed to mint the OIDC token for AWS
  contents: read
  pull-requests: write # so plan can be posted as a PR comment

env:
  AWS_REGION: eu-central-1
  TF_VERSION: "1.7.5"

jobs:
  plan:
    # Runs on every PR and every push to main -- read-only, costs nothing,
    # gives you visibility into drift/changes without ever touching real infra.
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform fmt -check -recursive
      - run: terraform init
      - run: terraform validate
      - run: terraform plan -no-color -out=tfplan
        id: plan

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan
            \`\`\`
            (see workflow run logs for full plan output)
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  apply:
    # Manual-only, and only if the confirmation phrase matches exactly.
    # Trigger from: repo -> Actions -> "Terraform (infra)" -> Run workflow.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_apply == 'apply'
    runs-on: ubuntu-latest
    environment: production # add required reviewers on this environment in repo settings for an extra manual gate
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform init
      - run: terraform apply -auto-approve
